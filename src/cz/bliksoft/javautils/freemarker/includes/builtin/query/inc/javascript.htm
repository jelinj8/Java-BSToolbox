<script type="text/javascript">

function loadURI(uri) {
	function okResponse() {
		   console.log(this.responseText);//should be return value of 1
		}

	function errorResponse() {
		   console.log('TrayTool call failed. Is the apropriate environment running?\n' + this.responseText);
		   window.alert('TrayTool call failed. Is the apropriate environment running?');
		}

	var oReq = new XMLHttpRequest();
	oReq.onload = okResponse;
	oReq.onerror = errorResponse;
	oReq.open("get", "http://localhost:${tray_port}/" + uri, true);
	oReq.send();
}

</script>
